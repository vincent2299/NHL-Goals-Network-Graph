<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NHL Goal Network</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #050505; color: white; font-family: Arial, sans-serif; overflow: hidden; display: flex; }
        .sidebar { width: 350px; min-width: 350px; height: 100vh; background: #111; padding: 25px; box-sizing: border-box; border-right: 1px solid #333; z-index: 10; }
        .graph-container { flex-grow: 1; height: 100vh; }
        #graph { width: 100%; height: 100%; outline: none; }
        h1 { margin: 0 0 5px 0; font-size: 24px; color: #3498db; }
        p.subtitle { margin: 0 0 20px 0; font-size: 14px; color: #aaa; }
        .divider { height: 1px; background: #333; margin: 20px 0; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #3498db; }
        button, .action-btn { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px; margin-bottom: 10px; transition: 0.2s; text-align: center; display: block; box-sizing: border-box; text-decoration: none; }
        button:hover, .action-btn:hover { background: #2980b9; }
        .longest-btn { background: #9b59b6; }
        .longest-btn:hover { background: #8e44ad; }
        .reset-btn { background: #555; }
        .reset-btn:hover { background: #777; }
        #status-box { font-size: 14px; margin-bottom: 15px; padding: 10px; border-radius: 6px; display: none; }
        .error { color: #e74c3c; background: rgba(231, 76, 60, 0.1); }
        .success { color: #f1c40f; background: rgba(241, 196, 15, 0.1); }
        .info { color: #2ecc71; background: rgba(46, 204, 113, 0.1); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>NHL Goal Network</h1>
        <p class="subtitle">Chronological Horseshoe Layout</p>

        <div id="status-box">
            {% if error %} <div class="error"><b>Error:</b> {{ error }}</div> {% endif %}
            {% if path %} <div class="success"><b>Path:</b><br>{{ path | join(' ➔ ') }}</div> {% endif %}
            {% if clicked %} <div class="info"><b>Inspecting:</b><br>{{ clicked }}</div> {% endif %}
        </div>
        
        <div class="divider"></div>

        <form method="GET" action="/">
            <label>Find Path Between Players</label>
            <input type="text" name="p1" placeholder="Player 1" value="{{ request.args.get('p1', '') }}" required>
            <input type="text" name="p2" placeholder="Player 2" value="{{ request.args.get('p2', '') }}" required>
            <button type="submit">Search Connection</button>
        </form>

        <form method="GET" action="/">
            <label>Inspect a Single Player</label>
            <input type="text" name="clicked" placeholder="Player Name (e.g. Connor McDavid)" required>
            <button type="submit">Inspect Player</button>
        </form>

        <div class="divider"></div>
        <a href="/?longest=true" class="action-btn longest-btn">Find Longest Connection</a>
        <a href="/" class="action-btn reset-btn">Clear / Reset Graph</a>
    </div>

    <div class="graph-container">
        <div id="graph"></div>
    </div>

    <script>
        var chartDom = document.getElementById('graph');
        var myChart = echarts.init(chartDom);
        
        // THE FIX: This correctly converts the Python dict into a JS object
        var graphData = {{ graph_data | tojson | safe }};

        var option = {
            tooltip: {
                backgroundColor: 'rgba(20,20,20,0.9)',
                borderColor: '#777',
                textStyle: { color: '#fff' },
                formatter: function (params) {
                    if (params.dataType === 'node') {
                        var attr = params.data.attributes;
                        return `<b style="font-size:16px">${params.data.name}</b><br/>
                                <span style="color:#aaa">Role:</span> ${attr.role}<br/>
                                <span style="color:#aaa">Debut:</span> ${attr.era}<br/>
                                <span style="color:#aaa">Goals Involved:</span> ${attr.goals}`;
                    }
                }
            },
            series:[{
                type: 'graph',
                layout: 'none',
                data: graphData.nodes,
                links: graphData.edges,
                roam: true,
                label: { show: false },
                emphasis: { disabled: true }, 
            }]
        };
        myChart.setOption(option);
        
        // CLICK HANDLER
        myChart.on('click', function(params) {
            if (params.dataType === 'node') {
                window.location.href = '/?clicked=' + encodeURIComponent(params.data.name);
            }
        });

        // Show status box if it has content
        if (document.getElementById('status-box').innerText.trim() !== "") {
            document.getElementById('status-box').style.display = 'block';
        }
    </script>
</body>
</html>
